<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Food Store – Registro</title>
  <link rel="stylesheet" href="../../../styles/global.css" />
  <link rel="stylesheet" href="../../../styles/auth.css" />
</head>
<body>

  <div class="contenedor-auth">
    <form class="formulario-auth" id="form-registro" novalidate>

      <h1>🍔 FOOD STORE</h1>
      <h2>Crear una cuenta</h2>

      <!-- Mensaje de error general -->
      <div class="error-general" id="error-general"></div>

      <!-- Campo email -->
      <div class="campo">
        <label for="email">Email</label>
        <input
          type="email"
          id="email"
          name="email"
          placeholder="tucorreo@ejemplo.com"
          autocomplete="off"
        />
        <span class="error-campo" id="error-email"></span>
      </div>

      <!-- Campo contraseña -->
      <div class="campo">
        <label for="password">Contraseña</label>
        <input
          type="password"
          id="password"
          name="password"
          placeholder="Mínimo 6 caracteres"
        />
        <span class="error-campo" id="error-password"></span>
      </div>

      <!-- Campo confirmar contraseña -->
      <div class="campo">
        <label for="confirmar-password">Confirmar contraseña</label>
        <input
          type="password"
          id="confirmar-password"
          name="confirmar-password"
          placeholder="Repetí tu contraseña"
        />
        <span class="error-campo" id="error-confirmar"></span>
      </div>


      <button type="submit" class="btn-submit">REGISTRARSE</button>

      <p class="link-auth">
        ¿Ya tenés cuenta? <a href="../login/login.html">Iniciá sesión</a>
      </p>

    </form>
  </div>

  <script type="module" src="./registro.ts"></script>
</body>
</html>
