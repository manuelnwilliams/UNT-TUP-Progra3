<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Food Store – Iniciar Sesión</title>
  <link rel="stylesheet" href="../../../styles/global.css" />
  <link rel="stylesheet" href="../../../styles/auth.css" />
</head>
<body>

  <div class="contenedor-auth">
    <form class="formulario-auth" id="form-login" novalidate>

      <h1>🍔 FOOD STORE</h1>
      <h2>Iniciar Sesión</h2>

      <!-- Mensaje de error general -->
      <div class="error-general" id="error-general">
        Email o contraseña incorrectos.
      </div>

      <!-- Campo email -->
      <div class="campo">
        <label for="email">Email</label>
        <input
          type="email"
          id="email"
          name="email"
          placeholder="tucorreo@ejemplo.com"
          autocomplete="off"
        />
        <span class="error-campo" id="error-email"></span>
      </div>

      <!-- Campo contraseña -->
      <div class="campo">
        <label for="password">Contraseña</label>
        <input
          type="password"
          id="password"
          name="password"
          placeholder="Mínimo 6 caracteres"
        />
        <span class="error-campo" id="error-password"></span>
      </div>

      <button type="submit" class="btn-submit">INGRESAR</button>

      <p class="link-auth">
        ¿No tenés cuenta? <a href="../registro/registro.html">Registrate acá</a>
      </p>

    </form>
  </div>

  <script type="module" src="./login.ts"></script>
</body>
</html>
